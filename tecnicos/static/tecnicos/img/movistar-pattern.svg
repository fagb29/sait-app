<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradiente principal -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0033A0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0041B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5CB615;stop-opacity:0.8" />
    </linearGradient>

    <!-- Patrón de círculos -->
    <pattern id="circlePattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="100" cy="100" r="2" fill="white" opacity="0.15"/>
      <circle cx="0" cy="0" r="2" fill="white" opacity="0.1"/>
      <circle cx="200" cy="0" r="2" fill="white" opacity="0.1"/>
      <circle cx="0" cy="200" r="2" fill="white" opacity="0.1"/>
      <circle cx="200" cy="200" r="2" fill="white" opacity="0.1"/>
    </pattern>

    <!-- Patrón de líneas diagonales -->
    <pattern id="diagonalLines" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="white" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Fondo base con gradiente -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>

  <!-- Capa de patrón de puntos -->
  <rect width="1920" height="1080" fill="url(#circlePattern)"/>

  <!-- Capa de líneas diagonales -->
  <rect width="1920" height="1080" fill="url(#diagonalLines)"/>

  <!-- Formas geométricas decorativas grandes -->
  <circle cx="150" cy="150" r="300" fill="white" opacity="0.03"/>
  <circle cx="1800" cy="900" r="400" fill="white" opacity="0.04"/>
  <circle cx="1700" cy="200" r="250" fill="#5CB615" opacity="0.05"/>
  <circle cx="300" cy="850" r="200" fill="#5CB615" opacity="0.04"/>

  <!-- Formas geométricas medianas -->
  <rect x="1400" y="600" width="300" height="300" rx="20" fill="white" opacity="0.02" transform="rotate(15 1550 750)"/>
  <rect x="100" y="400" width="200" height="200" rx="15" fill="white" opacity="0.025" transform="rotate(-20 200 500)"/>

  <!-- Logo M estilizado en el fondo (muy sutil) -->
  <g opacity="0.02">
    <circle cx="960" cy="540" r="180" fill="white"/>
    <text x="960" y="590" font-family="Arial Black, sans-serif" font-size="200" font-weight="900" fill="#0033A0" text-anchor="middle" dominant-baseline="middle">M</text>
  </g>

  <!-- Elementos decorativos pequeños dispersos -->
  <circle cx="500" cy="200" r="8" fill="white" opacity="0.15"/>
  <circle cx="1200" cy="300" r="6" fill="white" opacity="0.12"/>
  <circle cx="800" cy="700" r="10" fill="#5CB615" opacity="0.15"/>
  <circle cx="1500" cy="450" r="7" fill="white" opacity="0.13"/>
  <circle cx="400" cy="650" r="9" fill="white" opacity="0.14"/>
  <circle cx="1600" cy="750" r="8" fill="#5CB615" opacity="0.12"/>

  <!-- Líneas decorativas sutiles -->
  <line x1="0" y1="300" x2="600" y2="300" stroke="white" stroke-width="2" opacity="0.06"/>
  <line x1="1300" y1="800" x2="1920" y2="800" stroke="white" stroke-width="2" opacity="0.06"/>
  <line x1="1600" y1="0" x2="1600" y2="400" stroke="white" stroke-width="2" opacity="0.05"/>
  <line x1="300" y1="600" x2="300" y2="1080" stroke="#5CB615" stroke-width="2" opacity="0.05"/>
</svg>
